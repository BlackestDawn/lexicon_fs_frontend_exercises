<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="description" content="Interactive map of parking spaces and their availability in a parking garage.">
  <title>SmartParking Parkeringsgarage</title>
  <link rel="stylesheet" href="övning3.css">
</head>

<body>

  <header id="header-section">
    <h1 class="logo">SmartParking Live</h1>
    <nav class="menu-links">
      <a href="#karta">Karta</a><a href="#info">Info</a>
    </nav>
  </header>

  <main id="content-area">

    <section class="garage-container">
      <h2>Live-vy: Garageplan A</h2>
      <p>Klicka på en ruta för att se detaljer.</p>

      <div class="floor-layout">
        <button type="button" name="spot1" class="spot" aria-label="Parking spot 1"><span
            aria-hidden="true">🚗</span></button>
        <button type="button" name="spot2" class="spot" aria-label="Parking spot 2"><span
            aria-hidden="true">🚗</span></button>
        <button type="button" name="spot3" class="spot" aria-label="Parking spot 3"><span
            aria-hidden="true"></span></button>
        <button type="button" name="spot4" class="spot" aria-label="Parking spot 4"><span
            aria-hidden="true">🚗</span></button>
      </div>
    </section>

    <section class="info-sidebar">
      <h2>Priser och Regler</h2>
      <p>Standardtaxa: 20kr/h.</p>
      <p>Orangea streckade linjer visar zongränsen.</p>
    </section>

  </main>

  <footer id="footer-area">
    <p>© 2026 SmartParking AB</p>
  </footer>

</body>

</html>
